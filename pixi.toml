[workspace]
authors = ["Conor Bronsdon <cmbronsdon@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-captions"
description = "SRT and WebVTT subtitle/transcript parser in pure Mojo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
test = "mojo run -I src test/test_captions.mojo"
demo = "mojo run -I src examples/clip_transcript.mojo test/data/sample.vtt 0 20000"

[dependencies]
mojo = ">=1.0.0b3,<2"
